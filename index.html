  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "oklch(0.55 0.16 40)",
      "displayFont": "Syne",
      "heroStyle": "Geometric",
      "cardStyle": "Bordered"
    }/*EDITMODE-END*/;

    window.__TWEAK_DEFAULTS = TWEAK_DEFAULTS;

    function App() {
      const { page, projectSlug } = useRoute();
      const isHome = page === 'home' && !projectSlug;

      const renderPage = () => {
        switch (page) {
          case 'work':
            return projectSlug ? <ProjectDetail slug={projectSlug} /> : <Work />;
          case 'writing': return <Writing />;
          case 'speaking': return <Speaking />;
          case 'about': return <About />;
          default: return <Home />;
        }
      };

      return (
        <>
          {!isHome && <Nav />}
          <PageTransition pageKey={page + (projectSlug || '')}>
            {renderPage()}
          </PageTransition>
          {!isHome && <Footer />}
          <TweaksPanel />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <RouteProvider>
        <App />
      </RouteProvider>
    );
  </script>
